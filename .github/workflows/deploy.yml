name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin 036386573724.dkr.ecr.us-east-1.amazonaws.com

      - name: Build Docker Image
        run: docker build -t user-service .

      - name: Tag Image
        run: docker tag user-service:latest 036386573724.dkr.ecr.us-east-1.amazonaws.com/user-service:latest

      - name: Push to ECR
        run: docker push 036386573724.dkr.ecr.us-east-1.amazonaws.com/user-service:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 54.163.215.111
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo docker stop $(sudo docker ps -q) || true
            sudo docker rm $(sudo docker ps -aq) || true
            sudo docker pull 036386573724.dkr.ecr.us-east-1.amazonaws.com/user-service:latest
            sudo docker run -d -p 3000:3000 036386573724.dkr.ecr.us-east-1.amazonaws.com/user-service:latest